<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>clipd</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='4' y='5' width='16' height='17' rx='2' fill='%234a90d9'/%3E%3Crect x='8' y='2' width='8' height='6' rx='2' fill='%232c6fad'/%3E%3Crect x='7' y='10' width='10' height='1.5' rx='0.75' fill='%23fff' opacity='0.7'/%3E%3Crect x='7' y='13' width='8' height='1.5' rx='0.75' fill='%23fff' opacity='0.7'/%3E%3Crect x='7' y='16' width='6' height='1.5' rx='0.75' fill='%23fff' opacity='0.7'/%3E%3C/svg%3E">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  --bg:           #f0f0f0;
  --bg-surface:   #ffffff;
  --fg:           #222222;
  --fg-muted:     #666666;
  --border:       #dddddd;
  --border-focus: #1a73e8;
  --accent:       #1a73e8;
  --tab-hover:    #f0f0f0;
  --code-bg:      #f4f4f4;
  --shadow:       rgba(0,0,0,0.12);
  --save-saving:  #e8a01a;
  --save-saved:   #2e7d32;

  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--fg);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

body.dark {
  --bg:           #1a1a2e;
  --bg-surface:   #16213e;
  --fg:           #e0e0e0;
  --fg-muted:     #888888;
  --border:       #2d2d4e;
  --border-focus: #4a90d9;
  --accent:       #4a90d9;
  --tab-hover:    #0f3460;
  --code-bg:      #0d0d1f;
  --shadow:       rgba(0,0,0,0.4);
  --save-saving:  #e8a01a;
  --save-saved:   #4caf50;
}

/* ── Header ──────────────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  background: var(--bg-surface);
  border-bottom: 2px solid var(--border);
  padding: 0 16px;
  flex-shrink: 0;
}
.header h1 {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.3px;
  padding: 10px 0;
}
.header .spacer { flex: 1; }
.theme-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 14px;
  cursor: pointer;
  font-size: 13px;
  color: var(--fg-muted);
  transition: border-color 0.15s, color 0.15s;
}
.theme-btn:hover { border-color: var(--accent); color: var(--fg); }

/* ── Tab bar ─────────────────────────────────────────── */
.tab-bar {
  display: flex;
  align-items: center;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  padding: 0 8px;
  overflow-x: auto;
  flex-shrink: 0;
}
.tab {
  padding: 10px 18px;
  cursor: pointer;
  border: none;
  background: none;
  font-size: 14px;
  color: var(--fg-muted);
  white-space: nowrap;
  border-bottom: 3px solid transparent;
  transition: color 0.15s, background 0.15s;
  user-select: none;
}
.tab:hover { color: var(--fg); background: var(--tab-hover); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.tab-add {
  padding: 10px 14px;
  cursor: pointer;
  border: none;
  background: none;
  font-size: 20px;
  line-height: 1;
  color: var(--fg-muted);
  transition: color 0.15s;
}
.tab-add:hover { color: var(--accent); }

/* ── Toolbar ─────────────────────────────────────────── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 16px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.toolbar .spacer { flex: 1; }
.toolbar label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--fg-muted);
  cursor: pointer;
}
.toolbar input[type="checkbox"] { cursor: pointer; }
.save-status {
  font-size: 12px;
  color: var(--fg-muted);
  min-width: 64px;
  text-align: right;
}
.save-status.saving { color: var(--save-saving); }
.save-status.saved  { color: var(--save-saved); }

/* ── Content ─────────────────────────────────────────── */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 12px 16px;
  min-height: 0;
}
textarea {
  flex: 1;
  width: 100%;
  resize: none;
  padding: 12px;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  line-height: 1.5;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg-surface);
  color: var(--fg);
  outline: none;
  transition: border-color 0.15s;
}
textarea:focus { border-color: var(--border-focus); }
.markdown-view {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 15px;
  line-height: 1.7;
  color: var(--fg);
}
.markdown-view h1,.markdown-view h2,.markdown-view h3 { margin: .8em 0 .4em; }
.markdown-view p  { margin: .5em 0; }
.markdown-view code {
  background: var(--code-bg);
  padding: 2px 5px;
  border-radius: 3px;
  font-family: 'Courier New', monospace;
  font-size: .9em;
}
.markdown-view pre { background: var(--code-bg); padding: 12px; border-radius: 6px; overflow-x: auto; margin: .8em 0; }
.markdown-view pre code { background: none; padding: 0; }
.markdown-view blockquote { border-left: 3px solid var(--border); padding-left: 12px; color: var(--fg-muted); margin: .5em 0; }
.markdown-view ul,.markdown-view ol { padding-left: 24px; margin: .5em 0; }
.markdown-view a { color: var(--accent); }
.markdown-view table { border-collapse: collapse; margin: .8em 0; }
.markdown-view th,.markdown-view td { border: 1px solid var(--border); padding: 6px 12px; }
.markdown-view th { background: var(--code-bg); }
.empty-state {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--fg-muted);
  font-size: 16px;
}

/* ── Context menu ────────────────────────────────────── */
.ctx-menu {
  position: fixed;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  box-shadow: 0 4px 16px var(--shadow);
  z-index: 1000;
  min-width: 130px;
  padding: 4px 0;
  display: none;
}
.ctx-menu.open { display: block; }
.ctx-item {
  padding: 8px 16px;
  cursor: pointer;
  font-size: 14px;
  color: var(--fg);
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  transition: background 0.1s;
}
.ctx-item:hover { background: var(--tab-hover); }
.ctx-item.danger:hover { color: #c00; background: #fee2e2; }
body.dark .ctx-item.danger:hover { color: #ff8080; background: #3b1010; }

/* ── Inline rename input ─────────────────────────────── */
.rename-input {
  padding: 6px 10px;
  font-size: 14px;
  font-family: inherit;
  border: 1px solid var(--border-focus);
  border-radius: 4px;
  outline: none;
  background: var(--bg-surface);
  color: var(--fg);
  max-width: 160px;
}
</style>
</head>
<body>

<!-- Context menu (hidden by default) -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" id="ctxRename">&#9998; Rename</div>
  <div class="ctx-item danger" id="ctxDelete">&#128465; Delete</div>
</div>

<!-- Header -->
<div class="header">
  <h1>clipd</h1>
  <span class="spacer"></span>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">&#9790; Dark</button>
</div>

<!-- Tab bar -->
<div class="tab-bar" id="tabBar">
  <button class="tab-add" onclick="createTab()" title="New tab">+</button>
</div>

<!-- Toolbar (hidden when no tab is selected) -->
<div class="toolbar" id="toolbar" style="display:none">
  <span class="spacer"></span>
  <label><input type="checkbox" id="mdToggle" onchange="toggleMarkdown()"> Markdown</label>
  <span class="save-status" id="saveStatus"></span>
</div>

<!-- Content area -->
<div class="content">
  <div class="empty-state" id="emptyState">Click [+] to create a tab</div>
  <textarea id="editor" style="display:none" oninput="onEditorInput()"></textarea>
  <div class="markdown-view" id="mdView" style="display:none"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
let tabs = [];
let activeTabId = null;
let saveTimer = null;
let ctxTargetId = null; // tab targeted by the context menu

const tabBar    = document.getElementById('tabBar');
const toolbar   = document.getElementById('toolbar');
const editor    = document.getElementById('editor');
const mdView    = document.getElementById('mdView');
const mdToggle  = document.getElementById('mdToggle');
const saveStatus = document.getElementById('saveStatus');
const emptyState = document.getElementById('emptyState');
const ctxMenu   = document.getElementById('ctxMenu');
const themeBtn  = document.getElementById('themeBtn');

// ── Theme ──────────────────────────────────────────────────────────────────
function applyTheme(dark) {
  document.body.classList.toggle('dark', dark);
  themeBtn.innerHTML = dark ? '&#9728; Light' : '&#9790; Dark';
}

function toggleTheme() {
  const dark = !document.body.classList.contains('dark');
  localStorage.setItem('theme', dark ? 'dark' : 'light');
  applyTheme(dark);
}

// Init theme: respect localStorage, then system preference.
(function () {
  const saved = localStorage.getItem('theme');
  if (saved) {
    applyTheme(saved === 'dark');
  } else {
    applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
  }
})();

// ── API helper ─────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (res.status === 204) return null;
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ── Load tabs on startup ───────────────────────────────────────────────────
async function loadTabs() {
  tabs = await api('GET', '/api/tabs');
  renderTabBar();
  if (tabs.length > 0) {
    await selectTab(tabs[0].id);
  } else {
    showEmpty();
  }
}

// ── Render tab bar ─────────────────────────────────────────────────────────
function renderTabBar() {
  const addBtn = tabBar.querySelector('.tab-add');
  tabBar.innerHTML = '';
  tabs.forEach(tab => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    btn.dataset.id = tab.id;
    btn.textContent = tab.name;
    btn.onclick = () => selectTab(tab.id);
    btn.oncontextmenu = e => openCtxMenu(e, tab.id);
    tabBar.appendChild(btn);
  });
  tabBar.appendChild(addBtn);
}

// ── Select tab ─────────────────────────────────────────────────────────────
async function selectTab(id) {
  if (activeTabId && saveTimer) {
    clearTimeout(saveTimer);
    await saveCurrentTab();
  }
  activeTabId = id;
  mdToggle.checked = false;
  renderTabBar();
  const tab = await api('GET', `/api/tabs/${id}`);
  toolbar.style.display = 'flex';
  emptyState.style.display = 'none';
  editor.style.display = 'block';
  mdView.style.display = 'none';
  editor.value = tab.content;
  saveStatus.textContent = '';
  editor.focus();
}

function showEmpty() {
  activeTabId = null;
  toolbar.style.display = 'none';
  editor.style.display = 'none';
  mdView.style.display = 'none';
  emptyState.style.display = 'flex';
}

// ── Create tab ─────────────────────────────────────────────────────────────
async function createTab() {
  const tab = await api('POST', '/api/tabs', {});
  tabs.push(tab);
  renderTabBar();
  await selectTab(tab.id);
}

// ── Context menu ───────────────────────────────────────────────────────────
function openCtxMenu(e, tabId) {
  e.preventDefault();
  ctxTargetId = tabId;
  // Keep menu inside viewport
  const x = Math.min(e.clientX, window.innerWidth  - 150);
  const y = Math.min(e.clientY, window.innerHeight - 80);
  ctxMenu.style.left = x + 'px';
  ctxMenu.style.top  = y + 'px';
  ctxMenu.classList.add('open');
}

function closeCtxMenu() {
  ctxMenu.classList.remove('open');
  ctxTargetId = null;
}

document.addEventListener('click', e => {
  if (!ctxMenu.contains(e.target)) closeCtxMenu();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeCtxMenu();
});

// ── Rename (inline) ────────────────────────────────────────────────────────
document.getElementById('ctxRename').onclick = function () {
  const id = ctxTargetId;
  closeCtxMenu();
  const tab = tabs.find(t => t.id === id);
  if (!tab) return;

  const btn = tabBar.querySelector(`[data-id="${id}"]`);
  if (!btn) return;

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'rename-input';
  input.value = tab.name;
  btn.replaceWith(input);
  input.focus();
  input.select();

  async function commit() {
    const name = input.value.trim() || tab.name;
    const content = (activeTabId === id) ? editor.value : tab.content;
    const updated = await api('PUT', `/api/tabs/${id}`, { name, content });
    tab.name = updated.name;
    renderTabBar();
  }

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = tab.name; input.blur(); }
  });
};

// ── Delete ─────────────────────────────────────────────────────────────────
document.getElementById('ctxDelete').onclick = async function () {
  const id = ctxTargetId;
  closeCtxMenu();
  const tab = tabs.find(t => t.id === id);
  if (!tab) return;
  if (!confirm(`Delete "${tab.name}"?`)) return;

  await api('DELETE', `/api/tabs/${id}`);
  tabs = tabs.filter(t => t.id !== id);

  if (activeTabId === id) {
    if (tabs.length > 0) {
      await selectTab(tabs[0].id);
    } else {
      showEmpty();
    }
  }
  renderTabBar();
};

// ── Auto-save ──────────────────────────────────────────────────────────────
function onEditorInput() {
  if (saveTimer) clearTimeout(saveTimer);
  saveStatus.textContent = 'Saving...';
  saveStatus.className = 'save-status saving';
  saveTimer = setTimeout(saveCurrentTab, 500);
}

async function saveCurrentTab() {
  saveTimer = null;
  if (!activeTabId) return;
  const tab = tabs.find(t => t.id === activeTabId);
  if (!tab) return;
  try {
    await api('PUT', `/api/tabs/${activeTabId}`, { name: tab.name, content: editor.value });
    saveStatus.textContent = 'Saved \u2713';
    saveStatus.className = 'save-status saved';
  } catch (e) {
    saveStatus.textContent = 'Error saving';
    saveStatus.className = 'save-status';
    console.error('Save failed:', e);
  }
}

// ── Markdown toggle ────────────────────────────────────────────────────────
function toggleMarkdown() {
  if (mdToggle.checked) {
    editor.style.display = 'none';
    mdView.style.display = 'block';
    mdView.innerHTML = marked.parse(editor.value);
  } else {
    editor.style.display = 'block';
    mdView.style.display = 'none';
    editor.focus();
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
loadTabs();
</script>
</body>
</html>
