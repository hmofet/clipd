<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>clipd</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5; color: #333;
    display: flex; flex-direction: column; height: 100vh;
  }
  .tab-bar {
    display: flex; align-items: center; background: #fff;
    border-bottom: 2px solid #ddd; padding: 0 8px;
    overflow-x: auto; flex-shrink: 0;
  }
  .tab {
    padding: 10px 18px; cursor: pointer; border: none; background: none;
    font-size: 14px; color: #666; white-space: nowrap;
    border-bottom: 3px solid transparent; transition: all 0.15s;
  }
  .tab:hover { color: #333; background: #f0f0f0; }
  .tab.active { color: #1a73e8; border-bottom-color: #1a73e8; font-weight: 600; }
  .tab-add {
    padding: 10px 14px; cursor: pointer; border: none; background: none;
    font-size: 18px; color: #999; line-height: 1;
  }
  .tab-add:hover { color: #1a73e8; }
  .toolbar {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px; background: #fff; border-bottom: 1px solid #eee;
    flex-shrink: 0;
  }
  .toolbar button {
    padding: 5px 12px; border: 1px solid #ddd; background: #fff;
    border-radius: 4px; cursor: pointer; font-size: 13px; color: #555;
  }
  .toolbar button:hover { background: #f0f0f0; }
  .toolbar button.danger:hover { background: #fee; color: #c00; border-color: #fcc; }
  .toolbar .spacer { flex: 1; }
  .toolbar label {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: #666; cursor: pointer;
  }
  .toolbar input[type="checkbox"] { cursor: pointer; }
  .save-status {
    font-size: 12px; color: #999; min-width: 60px; text-align: right;
  }
  .save-status.saving { color: #e8a01a; }
  .save-status.saved { color: #2e7d32; }
  .content { flex: 1; display: flex; flex-direction: column; padding: 12px 16px; min-height: 0; }
  textarea {
    flex: 1; width: 100%; resize: none; padding: 12px;
    font-family: 'Courier New', monospace; font-size: 14px; line-height: 1.5;
    border: 1px solid #ddd; border-radius: 6px; background: #fff;
    outline: none; transition: border-color 0.15s;
  }
  textarea:focus { border-color: #1a73e8; }
  .markdown-view {
    flex: 1; overflow-y: auto; padding: 12px;
    background: #fff; border: 1px solid #ddd; border-radius: 6px;
    font-size: 15px; line-height: 1.7;
  }
  .markdown-view h1, .markdown-view h2, .markdown-view h3 { margin: 0.8em 0 0.4em; }
  .markdown-view p { margin: 0.5em 0; }
  .markdown-view code {
    background: #f0f0f0; padding: 2px 5px; border-radius: 3px;
    font-family: 'Courier New', monospace; font-size: 0.9em;
  }
  .markdown-view pre {
    background: #f0f0f0; padding: 12px; border-radius: 6px;
    overflow-x: auto; margin: 0.8em 0;
  }
  .markdown-view pre code { background: none; padding: 0; }
  .markdown-view blockquote {
    border-left: 3px solid #ddd; padding-left: 12px; color: #666; margin: 0.5em 0;
  }
  .markdown-view ul, .markdown-view ol { padding-left: 24px; margin: 0.5em 0; }
  .markdown-view a { color: #1a73e8; }
  .markdown-view table { border-collapse: collapse; margin: 0.8em 0; }
  .markdown-view th, .markdown-view td {
    border: 1px solid #ddd; padding: 6px 12px; text-align: left;
  }
  .markdown-view th { background: #f5f5f5; }
  .empty-state {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: #999; font-size: 16px;
  }
</style>
</head>
<body>

<div class="tab-bar" id="tabBar">
  <button class="tab-add" onclick="createTab()" title="New tab">+</button>
</div>

<div class="toolbar" id="toolbar" style="display:none">
  <button onclick="renameTab()">Rename</button>
  <button class="danger" onclick="deleteTab()">Delete</button>
  <span class="spacer"></span>
  <label><input type="checkbox" id="mdToggle" onchange="toggleMarkdown()"> Markdown</label>
  <span class="save-status" id="saveStatus"></span>
</div>

<div class="content" id="content">
  <div class="empty-state" id="emptyState">Click [+] to create a tab</div>
  <textarea id="editor" style="display:none" oninput="onEditorInput()"></textarea>
  <div class="markdown-view" id="mdView" style="display:none"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// State
let tabs = [];
let activeTabId = null;
let saveTimer = null;

const tabBar = document.getElementById('tabBar');
const toolbar = document.getElementById('toolbar');
const editor = document.getElementById('editor');
const mdView = document.getElementById('mdView');
const mdToggle = document.getElementById('mdToggle');
const saveStatus = document.getElementById('saveStatus');
const emptyState = document.getElementById('emptyState');

// --- API helpers ---
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (res.status === 204) return null;
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// --- Load all tabs on startup ---
async function loadTabs() {
  tabs = await api('GET', '/api/tabs');
  renderTabBar();
  if (tabs.length > 0) {
    selectTab(tabs[0].id);
  } else {
    activeTabId = null;
    toolbar.style.display = 'none';
    editor.style.display = 'none';
    mdView.style.display = 'none';
    emptyState.style.display = 'flex';
  }
}

// --- Render tab bar ---
function renderTabBar() {
  // Remove all tab buttons (keep the + button)
  const addBtn = tabBar.querySelector('.tab-add');
  tabBar.innerHTML = '';
  tabs.forEach(tab => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    btn.textContent = tab.name;
    btn.onclick = () => selectTab(tab.id);
    tabBar.appendChild(btn);
  });
  tabBar.appendChild(addBtn);
}

// --- Select a tab ---
async function selectTab(id) {
  // Save current tab before switching
  if (activeTabId && saveTimer) {
    clearTimeout(saveTimer);
    await saveCurrentTab();
  }
  activeTabId = id;
  mdToggle.checked = false;
  renderTabBar();

  const tab = await api('GET', `/api/tabs/${id}`);
  toolbar.style.display = 'flex';
  emptyState.style.display = 'none';
  editor.style.display = 'block';
  mdView.style.display = 'none';
  editor.value = tab.content;
  saveStatus.textContent = '';
  editor.focus();
}

// --- Create tab ---
async function createTab() {
  const tab = await api('POST', '/api/tabs', {});
  tabs.push(tab);
  renderTabBar();
  selectTab(tab.id);
}

// --- Rename tab ---
async function renameTab() {
  const tab = tabs.find(t => t.id === activeTabId);
  if (!tab) return;
  const name = prompt('Rename tab:', tab.name);
  if (name === null || name.trim() === '') return;
  const updated = await api('PUT', `/api/tabs/${tab.id}`, {
    name: name.trim(),
    content: editor.value
  });
  tab.name = updated.name;
  renderTabBar();
}

// --- Delete tab ---
async function deleteTab() {
  if (!activeTabId) return;
  const tab = tabs.find(t => t.id === activeTabId);
  if (!confirm(`Delete "${tab.name}"?`)) return;
  await api('DELETE', `/api/tabs/${activeTabId}`);
  tabs = tabs.filter(t => t.id !== activeTabId);
  if (tabs.length > 0) {
    selectTab(tabs[0].id);
  } else {
    activeTabId = null;
    toolbar.style.display = 'none';
    editor.style.display = 'none';
    mdView.style.display = 'none';
    emptyState.style.display = 'flex';
  }
  renderTabBar();
}

// --- Auto-save with debounce ---
function onEditorInput() {
  if (saveTimer) clearTimeout(saveTimer);
  saveStatus.textContent = 'Saving...';
  saveStatus.className = 'save-status saving';
  saveTimer = setTimeout(() => saveCurrentTab(), 500);
}

async function saveCurrentTab() {
  saveTimer = null;
  if (!activeTabId) return;
  const tab = tabs.find(t => t.id === activeTabId);
  if (!tab) return;
  try {
    await api('PUT', `/api/tabs/${activeTabId}`, {
      name: tab.name,
      content: editor.value
    });
    saveStatus.textContent = 'Saved \u2713';
    saveStatus.className = 'save-status saved';
  } catch (e) {
    saveStatus.textContent = 'Error saving';
    saveStatus.className = 'save-status';
    console.error('Save failed:', e);
  }
}

// --- Markdown toggle ---
function toggleMarkdown() {
  if (mdToggle.checked) {
    editor.style.display = 'none';
    mdView.style.display = 'block';
    mdView.innerHTML = marked.parse(editor.value);
  } else {
    editor.style.display = 'block';
    mdView.style.display = 'none';
    editor.focus();
  }
}

// --- Init ---
loadTabs();
</script>
</body>
</html>
